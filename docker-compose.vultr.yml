services:
  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    env_file:
      - .env.production
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
